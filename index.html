<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vikingos Pizza</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{ margin:0; padding:0; box-sizing:border-box; scroll-behavior:smooth; font-family:'Montserrat',sans-serif; }
        body{ background:#050505; color:white; overflow-x:hidden; }
        
        /* Navbar */
        header{ position:fixed; top:0; left:0; width:100%; z-index:999; background:#000; border-bottom:2px solid #ff7a00; }
        .container{ width:95%; max-width:1400px; margin:auto; }
        .navbar{ height:90px; display:flex; justify-content:space-between; align-items:center; }
        .logo{ display:flex; align-items:center; gap:15px; }
        .logo h2{ font-size:22px; font-weight:900; color:#ff7a00; }
        .menu{ display:flex; gap:35px; align-items:center; }
        .menu a{ color:white; text-decoration:none; font-size:14px; font-weight:600; transition:.3s; }
        .menu a:hover{ color:#ff7a00; }
        .order-btn{ background:#ff7a00; padding:14px 28px; border-radius:10px; font-weight:800; border:none; color:white; cursor:pointer; }

        /* Hero */
        .hero{ min-height:100vh; display:flex; align-items:center; background:linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.8)), url('https://images.unsplash.com/photo-1513104890138-7c749659a591?w=1600'); background-size:cover; padding-top:100px; }
        .hero-content{ display:grid; grid-template-columns:1fr 1fr; gap:60px; align-items:center; }
        .hero-text h1{ font-size:72px; line-height:1; font-weight:900; margin-bottom:25px; }
        .hero-text span{ color:#ff7a00; }
        .primary{ background:#ff7a00; color:white; border:none; padding:18px 35px; border-radius:12px; cursor:pointer; }

        /* Menú y otros elementos (simplificado para brevedad) */
        .menu-section{ padding:120px 0; background:#0a0a0a; }
        .products-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:30px; }
        .product-card{ background:#111; border-radius:22px; padding:20px; border:1px solid #1f1f1f; }
        .price{ font-size:24px; color:#ff7a00; font-weight:900; margin:15px 0; }
        .cart-btn{ background:#ff7a00; color:white; border:none; padding:10px; border-radius:8px; cursor:pointer; width:100%; }

        /* Estilos básicos para el carrito */
        .floating-cart{ position:fixed; right:25px; bottom:25px; width:70px; height:70px; background:#ff7a00; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:999; }
        .cart-sidebar{ position:fixed; top:0; right:-450px; width:420px; height:100vh; background:#111; z-index:9999; transition:.4s; padding:20px; }
        .cart-sidebar.active{ right:0; }
        .checkout-modal{ display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.85); z-index:10000; align-items:center; justify-content:center; }
        .checkout-modal.active{ display:flex; }
    </style>
</head>
<body>

<header>
    <div class="container navbar">
        <div class="logo"><h2>VIKINGOS</h2></div>
        <nav class="menu">
            <a href="#inicio">INICIO</a>
            <a href="#menu">MENÚ</a>
        </nav>
        <button class="order-btn">ORDENAR AHORA</button>
    </div>
</header>

<section class="hero" id="inicio">
    <div class="container hero-content">
        <div class="hero-text">
            <h1>LAS MEJORES <span>PIZZAS</span></h1>
            <button class="primary" onclick="document.getElementById('menu').scrollIntoView()">ORDENAR AHORA</button>
        </div>
    </div>
</section>

<section class="menu-section" id="menu">
    <div class="container">
        <div class="products-grid">
            <div class="product-card">
                <h3>Pizza Vikinga</h3>
                <div class="price">$33.900</div>
                <button class="cart-btn" onclick="addToCart('Pizza Vikinga', 33900)">AGREGAR</button>
            </div>
        </div>
    </div>
</section>

<div class="floating-cart" onclick="toggleCart()">🛒 <span id="cartCount">0</span></div>
<div class="cart-sidebar" id="cartSidebar">
    <button onclick="toggleCart()">Cerrar</button>
    <div id="cartItems"></div>
    <button class="cart-btn" onclick="openCheckout()">FINALIZAR COMPRA</button>
</div>

<div class="checkout-modal" id="checkoutModal">
    <div style="background:#222; padding:20px; border-radius:10px;">
        <h2>Finalizar Compra</h2>
        <form id="checkoutForm">
            <input type="text" placeholder="Nombre" required>
            <button type="submit">CONFIRMAR</button>
        </form>
        <button onclick="closeCheckout()">Cancelar</button>
    </div>
</div>

<script>
    let cart = [];
    function toggleCart() { document.getElementById("cartSidebar").classList.toggle("active"); }
    function addToCart(name, price) { cart.push({name, price}); alert("Agregado: " + name); }
    function openCheckout() { document.getElementById("checkoutModal").classList.add("active"); }
    function closeCheckout() { document.getElementById("checkoutModal").classList.remove("active"); }
    document.getElementById("checkoutForm").addEventListener("submit", (e) => { e.preventDefault(); alert("Pedido enviado!"); closeCheckout(); });
</script>

</body>
</html>
